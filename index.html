<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Photobooth Kawaii Pink (Portrait)</title>
<style>
body { font-family: Arial; text-align: center; background: #111; }
video { border-radius: 15px; margin-top:10px; object-fit: cover; }
canvas { margin-top:20px; border-radius:20px; }
button { margin:10px; padding:10px 20px; border:none; border-radius:10px; background:pink; font-weight:bold; }
</style>
</head>
<body>

<h2 style="color:white">💖 Photobooth rinduy 💖</h2>

<!-- Portrait camera -->
<video id="video" width="300" height="400" autoplay playsinline></video><br>
<button onclick="takePhotos()">Mulai</button>
<button onclick="download()">Download</button>

<!-- Canvas lebih tinggi -->
<canvas id="canvas" width="420" height="1100"></canvas>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

// paksa portrait
navigator.mediaDevices.getUserMedia({
  video: {
    facingMode: "user",
    width: { ideal: 720 },
    height: { ideal: 1280 }
  }
}).then(s => video.srcObject = s);

function delay(ms){return new Promise(r=>setTimeout(r,ms));}

function drawSticker(){
  ctx.font="30px Arial";
  ctx.fillText("🐱",10,150);
  ctx.fillText("🐱",360,350);
  ctx.fillText("🐱",10,700);
  ctx.fillText("🌸",350,150);
  ctx.fillText("🌸",20,450);
  ctx.fillText("🌸",350,900);
}

async function takePhotos(){
  let grad = ctx.createLinearGradient(0,0,0,1100);
  grad.addColorStop(0,"#ff9ecf");
  grad.addColorStop(1,"#ffc0cb");
  ctx.fillStyle=grad;
  ctx.fillRect(0,0,420,1100);

  ctx.fillStyle="white";
  ctx.font="bold 40px Arial";
  ctx.fillText("Photobooth",90,50);

  for(let i=0;i<3;i++){
    await delay(2000);

    // frame besar portrait
    ctx.fillStyle="white";
    ctx.fillRect(30,80+i*330,360,300);

    ctx.lineWidth=18;
    ctx.strokeStyle="#ff69b4";
    ctx.strokeRect(30,80+i*330,360,300);

    // foto portrait (lebih tinggi)
    ctx.drawImage(video,70,110+i*330,280,240);
  }

  drawSticker();

  ctx.fillStyle="white";
  ctx.font="20px Arial";
  ctx.fillText("Smile • Pose • Click",80,1050);
}

function download(){
  let link=document.createElement('a');
  link.download='photobooth-portrait.png';
  link.href=canvas.toDataURL();
  link.click();
}
</script>

</body>
</html>
