<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Photobooth Kawaii Pink (HP)</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #111;
  margin: 0;
}

/* VIDEO FULL HP */
video {
  width: 100%;
  height: 70vh;
  object-fit: cover;
  border-radius: 0 0 20px 20px;
}

/* CONTAINER TOMBOL DEKAT VIDEO */
.controls {
  margin-top: -20px;
  padding: 10px;
}

/* TOMBOL */
button {
  margin: 5px;
  padding: 12px 20px;
  border: none;
  border-radius: 20px;
  background: hotpink;
  color: white;
  font-weight: bold;
  font-size: 16px;
}

/* CANVAS */
canvas {
  width: 90%;
  max-width: 420px;
  margin-top: 15px;
  border-radius: 20px;
}
</style>
</head>

<body>

<h2 style="color:white">💖 Photobooth Kawaii 💖</h2>

<video id="video" autoplay playsinline></video>

<!-- tombol nempel bawah kamera -->
<div class="controls">
  <button onclick="takePhotos()">📸 Mulai</button>
  <button onclick="download()">⬇️ Simpan</button>
</div>

<canvas id="canvas" width="420" height="1100"></canvas>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

navigator.mediaDevices.getUserMedia({
  video: { facingMode: "user" }
}).then(s => video.srcObject = s);

function delay(ms){return new Promise(r=>setTimeout(r,ms));}

function drawSticker(){
  ctx.font="30px Arial";
  ctx.fillText("🐱",10,150);
  ctx.fillText("🐱",360,350);
  ctx.fillText("🐱",10,700);
  ctx.fillText("🌸",350,150);
  ctx.fillText("🌸",20,450);
  ctx.fillText("🌸",350,900);
}

async function takePhotos(){
  let grad = ctx.createLinearGradient(0,0,0,1100);
  grad.addColorStop(0,"#ff9ecf");
  grad.addColorStop(1,"#ffc0cb");
  ctx.fillStyle=grad;
  ctx.fillRect(0,0,420,1100);

  ctx.fillStyle="white";
  ctx.font="bold 40px Arial";
  ctx.fillText("Photobooth",90,50);

  for(let i=0;i<3;i++){
    await delay(2000);

    ctx.fillStyle="white";
    ctx.fillRect(30,80+i*330,360,300);

    ctx.lineWidth=18;
    ctx.strokeStyle="#ff69b4";
    ctx.strokeRect(30,80+i*330,360,300);

    ctx.drawImage(video,70,110+i*330,280,240);
  }

  drawSticker();

  ctx.fillStyle="white";
  ctx.font="20px Arial";
  ctx.fillText("Smile • Pose • Click",80,1050);
}

function download(){
  let link=document.createElement('a');
  link.download='photobooth-portrait.png';
  link.href=canvas.toDataURL();
  link.click();
}
</script>

</body>
</html>
