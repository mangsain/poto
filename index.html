<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Photobooth Korea Style</title>

<style>
body{
  margin:0;
  font-family: 'Poppins', sans-serif;
  background:#f3d6dd;
  display:flex;
  justify-content:center;
}

.container{
  width:360px;
  background:linear-gradient(180deg,#ffd1dc,#ff9ecf);
  border-radius:25px;
  padding:15px;
  box-shadow:0 15px 40px rgba(0,0,0,0.2);
}

.title{
  text-align:center;
  font-size:36px;
  font-weight:800;
  color:#ff4f87;
  margin-bottom:10px;
  text-shadow:2px 2px white;
}

.video-box{
  background:#ddd;
  border-radius:20px;
  overflow:hidden;
}

video{
  width:100%;
  height:280px;
  object-fit:cover;
}

.status{
  text-align:center;
  margin:10px 0;
  color:#444;
}

.counter{
  width:90px;
  height:90px;
  border-radius:50%;
  border:3px dashed #ff6fa3;
  margin:10px auto;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:36px;
  color:#ff6fa3;
  background:white;
}

.steps{
  display:flex;
  justify-content:space-between;
  margin:10px 0;
}

.steps div{
  font-size:12px;
  color:#888;
}

.btn-group{
  display:flex;
  justify-content:space-between;
}

.btn{
  flex:1;
  margin:5px;
  padding:12px;
  border:none;
  border-radius:20px;
  font-weight:bold;
}

.start{ background:#ff6fa3; color:white; }
.reset{ background:#eee; }

canvas{
  width:100%;
  margin-top:15px;
  border-radius:20px;
}

</style>
</head>
<body>

<div class="container">
  <div class="title">Photobooth</div>

  <div class="video-box">
    <video id="video" autoplay playsinline></video>
  </div>

  <div class="status">Bersiap! Foto akan diambil dalam</div>

  <div class="counter" id="count">3</div>

  <div class="steps">
    <div>1<br>Foto</div>
    <div>2<br>Foto</div>
    <div>3<br>Foto</div>
    <div>4<br>Foto</div>
  </div>

  <div class="btn-group">
    <button class="btn start" onclick="takePhotos()">📸 MULAI</button>
    <button class="btn reset" onclick="location.reload()">🔄 RESET</button>
  </div>

  <canvas id="canvas" width="360" height="640"></canvas>
</div>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const counter = document.getElementById('count');

navigator.mediaDevices.getUserMedia({ video:{ facingMode:"user" }})
.then(s=>video.srcObject=s);

function delay(ms){return new Promise(r=>setTimeout(r,ms));}

function drawBackground(){
  let g = ctx.createLinearGradient(0,0,0,640);
  g.addColorStop(0,'#ffc1d6');
  g.addColorStop(1,'#ff8fb1');
  ctx.fillStyle=g;
  ctx.fillRect(0,0,360,640);

  // dekor bunga & kucing (emoji simulasi)
  ctx.font='20px Arial';
  ctx.fillText('🌸',10,80);
  ctx.fillText('🌸',320,150);
  ctx.fillText('🐱',10,300);
  ctx.fillText('🐱',300,550);
}

function frame(x,y,w,h){
  ctx.fillStyle='white';
  ctx.fillRect(x,y,w,h);

  ctx.strokeStyle='#ff6fa3';
  ctx.lineWidth=3;
  ctx.setLineDash([6,4]);
  ctx.strokeRect(x,y,w,h);
  ctx.setLineDash([]);
}

function crop(dx,dy,dw,dh){
  const vw=video.videoWidth;
  const vh=video.videoHeight;
  const r=dw/dh;
  const vr=vw/vh;
  let sx,sy,sw,sh;

  if(vr>r){ sh=vh; sw=vh*r; sx=(vw-sw)/2; sy=0; }
  else{ sw=vw; sh=vw/r; sx=0; sy=(vh-sh)/2; }

  ctx.drawImage(video,sx,sy,sw,sh,dx,dy,dw,dh);
}

async function takePhotos(){
  drawBackground();

  let y=60;

  for(let i=0;i<4;i++){
    for(let c=3;c>0;c--){
      counter.innerText=c;
      await delay(600);
    }

    frame(40,y,280,120);
    crop(50,y+10,260,100);

    y+=140;
  }

  ctx.fillStyle='white';
  ctx.font='16px Arial';
  ctx.fillText('— Smile • Pose • Click —',70,620);
}
</script>

</body>
</html>
